apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: incident-responder
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GY2AN/devops-gitops
    targetRevision: HEAD
    path: charts/incident-responder
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

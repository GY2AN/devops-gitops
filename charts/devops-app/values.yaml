replicaCount: 2

image:
  repository: 532549085896.dkr.ecr.ap-south-1.amazonaws.com/devops-app
  tag: 6db3619dcc0a6ddb5673f97b5a4ae1f1ea2f13bb
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  path: /ready
  initialDelaySeconds: 3
  periodSeconds: 5

imagePullSecrets:
  - name: ecr-pull-secret
